<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Fira Code','JetBrains Mono',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2440"/>
      <stop offset="1" stop-color="#1f1b2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" rx="18" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="599" rx="18" fill="none" stroke="#9141ac" stroke-opacity="0.35"/>

  <!-- terminal window -->
  <rect x="80" y="90" width="700" height="420" rx="12" fill="#191622" stroke="#9141ac" stroke-opacity="0.4"/>
  <rect x="80" y="90" width="700" height="40" rx="12" fill="#241f31"/>
  <circle cx="106" cy="110" r="6" fill="#ed6b5e"/>
  <circle cx="128" cy="110" r="6" fill="#ffa348"/>
  <circle cx="150" cy="110" r="6" fill="#57e389"/>
  <text x="400" y="115" text-anchor="middle" font-size="15" fill="#9a8fb0">siegedsec@telegram: ~</text>

  <g font-size="22" fill="#f6f5f4">
    <text x="108" y="185"><tspan fill="#c061cb">$</tspan> whoami</text>
    <text x="108" y="225" fill="#9141ac">siegedsec :: gay furry hackers</text>
    <text x="108" y="285"><tspan fill="#c061cb">$</tspan> cat mission.txt</text>
    <text x="108" y="325" fill="#cdb4db">"have fun and cause chaos"  <tspan fill="#ffa348">^-^</tspan></text>
    <text x="108" y="385"><tspan fill="#c061cb">$</tspan> cat impact.log</text>
    <text x="108" y="425" fill="#9a8fb0">reclamado: 200 GB  ·  real: 2 GB</text>
    <text x="108" y="465"><tspan fill="#c061cb">$</tspan> <tspan fill="#57e389">_</tspan><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></text>
  </g>

  <!-- cat/fox line-art motif -->
  <g transform="translate(960,300)" stroke="#9141ac" stroke-opacity="0.55" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M -90 -70 L -55 -10 M 90 -70 L 55 -10"/>
    <path d="M -90 -70 L -78 0 M 90 -70 L 78 0"/>
    <path d="M -85 -10 C -110 60 -60 130 0 130 C 60 130 110 60 85 -10"/>
    <path d="M -42 30 a 8 8 0 0 0 16 0" />
    <path d="M 26 30 a 8 8 0 0 0 16 0" />
    <path d="M -16 62 q 16 14 32 0"/>
  </g>
  <text x="960" y="470" text-anchor="middle" font-size="20" fill="#9a8fb0">SiegedSec · 2022—2024</text>
</svg>
